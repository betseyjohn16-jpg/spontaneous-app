openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: suggest
    description: AI-powered spontaneous suggestions
  - name: reservations
    description: Reservation management
  - name: reviews
    description: Restaurant reviews
  - name: restaurant
    description: Restaurant partner portal
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /suggest/restaurant:
    post:
      operationId: suggestRestaurant
      tags: [suggest]
      summary: Get a random restaurant suggestion
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestRestaurantInput"
      responses:
        "200":
          description: Restaurant suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantSuggestion"

  /suggest/activity:
    post:
      operationId: suggestActivity
      tags: [suggest]
      summary: Get a random day activity plan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestActivityInput"
      responses:
        "200":
          description: Activity day plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPlan"

  /reviews:
    get:
      operationId: getReviews
      tags: [reviews]
      summary: Get reviews for a restaurant
      parameters:
        - name: restaurantId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reservations:
    post:
      operationId: makeReservation
      tags: [reservations]
      summary: Make a restaurant reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationRequest"
      responses:
        "200":
          description: Reservation confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationConfirmation"

  # ─── Restaurant Partner Portal ───────────────────────────────────────────────

  /restaurant/me:
    get:
      operationId: getMyRestaurant
      tags: [restaurant]
      summary: Get the authenticated restaurant owner's profile
      responses:
        "200":
          description: Restaurant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
        "404":
          description: Not registered yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateMyRestaurant
      tags: [restaurant]
      summary: Update the restaurant profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantUpdate"
      responses:
        "200":
          description: Updated restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurant/register:
    post:
      operationId: registerRestaurant
      tags: [restaurant]
      summary: Register as a restaurant partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantInput"
      responses:
        "201":
          description: Created restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurant/dashboard:
    get:
      operationId: getRestaurantDashboard
      tags: [restaurant]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /restaurant/availability:
    get:
      operationId: listAvailabilitySlots
      tags: [restaurant]
      summary: List all availability slots
      responses:
        "200":
          description: Availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"
    post:
      operationId: createAvailabilitySlot
      tags: [restaurant]
      summary: Add a new availability slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySlotInput"
      responses:
        "201":
          description: Created slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySlot"

  /restaurant/availability/{id}:
    delete:
      operationId: deleteAvailabilitySlot
      tags: [restaurant]
      summary: Delete an availability slot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /restaurant/blackouts:
    get:
      operationId: listBlackouts
      tags: [restaurant]
      summary: List all blackout periods
      responses:
        "200":
          description: Blackout periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blackout"
    post:
      operationId: createBlackout
      tags: [restaurant]
      summary: Add a blackout period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlackoutInput"
      responses:
        "201":
          description: Created blackout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blackout"

  /restaurant/blackouts/{id}:
    delete:
      operationId: deleteBlackout
      tags: [restaurant]
      summary: Delete a blackout period
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /restaurant/menu:
    get:
      operationId: listMenuItems
      tags: [restaurant]
      summary: List all menu items
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [restaurant]
      summary: Add a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /restaurant/menu/{id}:
    patch:
      operationId: updateMenuItem
      tags: [restaurant]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [restaurant]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /restaurant/reservations:
    get:
      operationId: listRestaurantReservations
      tags: [restaurant]
      summary: List all reservations for this restaurant
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, declined, all]
      responses:
        "200":
          description: Reservations with order items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReservationWithOrder"

  /restaurant/reservations/{id}/accept:
    post:
      operationId: acceptReservation
      tags: [restaurant]
      summary: Accept a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationWithOrder"

  /restaurant/reservations/{id}/decline:
    post:
      operationId: declineReservation
      tags: [restaurant]
      summary: Decline a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationWithOrder"

  /restaurants/{restaurantId}/availability:
    get:
      operationId: getPublicAvailability
      tags: [restaurant]
      summary: Get available slots for a restaurant (customer-facing)
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

  /restaurants/{restaurantId}/menu:
    get:
      operationId: getPublicMenu
      tags: [restaurant]
      summary: Get menu for a restaurant (customer-facing)
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiImageOutput"

components:
  schemas:
    # ─── Restaurant Partner Portal ──────────────────────────────────────────────
    Restaurant:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        name:
          type: string
        cuisine:
          type: string
        description:
          type: ["string", "null"]
        address:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        openingHours:
          type: ["string", "null"]
        priceRange:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ownerId
        - name
        - cuisine
        - address
        - isActive
        - createdAt

    RestaurantInput:
      type: object
      properties:
        name:
          type: string
        cuisine:
          type: string
        description:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        openingHours:
          type: string
        priceRange:
          type: string
      required:
        - name
        - cuisine
        - address

    RestaurantUpdate:
      type: object
      properties:
        name:
          type: string
        cuisine:
          type: string
        description:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        openingHours:
          type: string
        priceRange:
          type: string
        isActive:
          type: boolean

    AvailabilitySlot:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        date:
          type: string
        time:
          type: string
        partyMin:
          type: integer
        partyMax:
          type: integer
        capacity:
          type: integer
        booked:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - restaurantId
        - date
        - time
        - partyMin
        - partyMax
        - capacity
        - booked
        - createdAt

    AvailabilitySlotInput:
      type: object
      properties:
        date:
          type: string
        time:
          type: string
        partyMin:
          type: integer
        partyMax:
          type: integer
        capacity:
          type: integer
      required:
        - date
        - time
        - partyMin
        - partyMax
        - capacity

    Blackout:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - restaurantId
        - startDate
        - endDate
        - createdAt

    BlackoutInput:
      type: object
      properties:
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: string
      required:
        - startDate
        - endDate

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: string
        dietaryTags:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - restaurantId
        - name
        - price
        - category
        - isAvailable
        - createdAt

    MenuItemInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        dietaryTags:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
      required:
        - name
        - price
        - category

    MenuItemUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        dietaryTags:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        menuItemId:
          type: integer
        menuItemName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - id
        - menuItemId
        - menuItemName
        - price
        - quantity

    ReservationWithOrder:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        customerId:
          type: ["string", "null"]
        customerName:
          type: string
        customerEmail:
          type: ["string", "null"]
        partySize:
          type: integer
        date:
          type: string
        time:
          type: string
        confirmationCode:
          type: string
        status:
          type: string
          enum: [pending, accepted, declined]
        specialRequests:
          type: ["string", "null"]
        orderItems:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalOrderAmount:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - restaurantId
        - customerName
        - partySize
        - date
        - time
        - confirmationCode
        - status
        - orderItems
        - totalOrderAmount
        - createdAt

    DashboardStats:
      type: object
      properties:
        todayReservations:
          type: integer
        pendingReservations:
          type: integer
        totalReservations:
          type: integer
        totalMenuItems:
          type: integer
        upcomingReservations:
          type: array
          items:
            $ref: "#/components/schemas/ReservationWithOrder"
      required:
        - todayReservations
        - pendingReservations
        - totalReservations
        - totalMenuItems
        - upcomingReservations

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── Existing schemas ───────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        restaurantName:
          type: string
        userName:
          type: string
        rating:
          type: integer
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - restaurantId
        - restaurantName
        - userName
        - rating
        - text
        - createdAt

    CreateReviewInput:
      type: object
      properties:
        restaurantId:
          type: string
        restaurantName:
          type: string
        userName:
          type: string
        rating:
          type: integer
        text:
          type: string
      required:
        - restaurantId
        - restaurantName
        - userName
        - rating
        - text

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserPreferences:
      type: object
      properties:
        allergies:
          type: array
          items:
            type: string
          description: Dietary restrictions and allergies
        accessibility:
          type: array
          items:
            type: string
          description: Accessibility accommodations needed
        radiusMiles:
          type: number
          description: Search radius in miles
        userLat:
          type: number
          description: User latitude
        userLng:
          type: number
          description: User longitude

    SuggestRestaurantInput:
      type: object
      properties:
        cuisine:
          type: string
          description: Optional cuisine preference
        budget:
          type: string
          enum: [cheap, moderate, expensive, luxury]
        allergies:
          type: array
          items:
            type: string
        accessibility:
          type: array
          items:
            type: string
        radiusMiles:
          type: number
        userLat:
          type: number
        userLng:
          type: number

    RestaurantSuggestion:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cuisine:
          type: string
        description:
          type: string
        address:
          type: string
        neighborhood:
          type: string
        attire:
          type: string
        attireDescription:
          type: string
        estimatedCostPerPerson:
          type: number
        costRange:
          type: string
        rating:
          type: number
        ambiance:
          type: string
        specialtyDish:
          type: string
        reservationTime:
          type: string
        waitTime:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        distanceMiles:
          type: number
        accessibilityFeatures:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - cuisine
        - description
        - address
        - neighborhood
        - attire
        - attireDescription
        - estimatedCostPerPerson
        - costRange
        - rating
        - ambiance
        - specialtyDish
        - reservationTime
        - waitTime
        - latitude
        - longitude

    SuggestActivityInput:
      type: object
      properties:
        mood:
          type: string
          description: Optional mood or vibe preference
        allergies:
          type: array
          items:
            type: string
        accessibility:
          type: array
          items:
            type: string
        radiusMiles:
          type: number
        userLat:
          type: number
        userLng:
          type: number

    ActivityEvent:
      type: object
      properties:
        time:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        estimatedCost:
          type: number
        duration:
          type: string
        category:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        distanceMiles:
          type: number
      required:
        - time
        - title
        - description
        - location
        - estimatedCost
        - duration
        - category
        - latitude
        - longitude

    ActivityPlan:
      type: object
      properties:
        id:
          type: string
        theme:
          type: string
        tagline:
          type: string
        totalEstimatedCost:
          type: number
        events:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
      required:
        - id
        - theme
        - tagline
        - totalEstimatedCost
        - events

    ReservationRequest:
      type: object
      properties:
        restaurantName:
          type: string
        restaurantId:
          type: string
        partySize:
          type: integer
        reservationTime:
          type: string
      required:
        - restaurantName
        - restaurantId
        - partySize
        - reservationTime

    ReservationConfirmation:
      type: object
      properties:
        confirmationCode:
          type: string
        restaurantName:
          type: string
        partySize:
          type: integer
        reservationTime:
          type: string
        message:
          type: string
      required:
        - confirmationCode
        - restaurantName
        - partySize
        - reservationTime
        - message

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
