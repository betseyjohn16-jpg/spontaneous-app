kind = "web"
previewPath = "/restaurant-portal/"
title = "Restaurant Partner Portal"
version = "1.0.0"
id = "artifacts/restaurant-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/restaurant-portal/" ]
localPort = 21206

[services.development]
run = "pnpm --filter @workspace/restaurant-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/restaurant-portal", "run", "build" ]
publicDir = "artifacts/restaurant-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21206"
BASE_PATH = "/restaurant-portal/"
